name: LaTeX CI
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-luatex texlive-latex-base texlive-latex-recommended texlive-fonts-recommended texlive-lang-arabic texlive-lang-cyrillic texlive-lang-cjk poppler-utils fonts-liberation ripgrep
          sudo apt-get install -y fonts-hosny-amiri

      - name: Check forbidden patterns
        run: bash tests/check-forbidden-patterns.sh

      - name: Check fonts
        run: bash tests/font-check.sh

      - name: Compile all LaTeX examples
        run: bash tests/compile-all.sh

      - name: Extract text from PDFs
        run: bash tests/extract-text.sh

      - name: Validate ATS extraction
        run: bash tests/ats-validate.sh

      - name: Run human scan check
        run: bash tests/human-scan-check.sh

      - name: Run CTAN readiness check
        run: bash tests/ctan-check.sh
